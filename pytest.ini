[pytest]
# Root-level pytest config so warning filters apply when running `pytest` from repo root.
# Keep this minimal and defer to backend settings where possible.
filterwarnings =
    # FastAPI / Starlette: asyncio.iscoroutinefunction deprecated in Python 3.14+
    ignore:'asyncio\.iscoroutinefunction' is deprecated.*:DeprecationWarning

    # Starlette: python_multipart import style
    ignore:Please use `import python_multipart` instead\.:PendingDeprecationWarning

    # Supabase / gotrue: gotrue package deprecated
    ignore:The `gotrue` package is deprecated.*:DeprecationWarning

    # Pydantic v1 internals used by older SDKs
    ignore:ForwardRef\._evaluate is a private API.*:DeprecationWarning
    ignore:Core Pydantic V1 functionality isn't compatible with Python 3\.14 or greater\.:UserWarning

    # pytest internal: ZipFile deallocator noise on Python 3.14
    ignore:Exception ignored while calling deallocator <function ZipFile\.__del__.*:pytest.PytestUnraisableExceptionWarning
    ignore::pytest.PytestUnraisableExceptionWarning
