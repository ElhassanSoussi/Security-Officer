# Phase 20 Part 5 — CI/CD Pipeline
# Runs on every push/PR to main; validates backend tests, frontend type
# checks, lint, and build. Fails fast on any error.

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  # Minimal env vars required for backend imports (tests mock DB calls)
  SUPABASE_URL: "https://placeholder.supabase.co"
  SUPABASE_KEY: "placeholder-key"
  SUPABASE_SERVICE_ROLE_KEY: "placeholder-service-key"
  SUPABASE_JWT_SECRET: "placeholder-jwt-secret"
  ENVIRONMENT: "development"

jobs:
  # ── Backend Tests ────────────────────────────────────────────────────────────
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  # ── Frontend Checks ─────────────────────────────────────────────────────────
  frontend-checks:
    name: Frontend Lint + TypeCheck + Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder-anon-key"
          NEXT_PUBLIC_API_URL: "http://localhost:8000/api/v1"

  # ── Docker Build Validation ──────────────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-checks]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t compliance-backend:ci ./backend

      - name: Build frontend image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_SUPABASE_URL="https://placeholder.supabase.co" \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="placeholder" \
            --build-arg NEXT_PUBLIC_API_URL="http://localhost:8000/api/v1" \
            -t compliance-frontend:ci ./frontend

