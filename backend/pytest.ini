[pytest]
filterwarnings =
    # ── Third-party package warnings we cannot fix ──────────────────────────

    # FastAPI / Starlette: asyncio.iscoroutinefunction deprecated in Python 3.14
    ignore:'asyncio.iscoroutinefunction' is deprecated:DeprecationWarning:fastapi
    ignore:'asyncio.iscoroutinefunction' is deprecated:DeprecationWarning:starlette

    # Starlette: python_multipart import style
    ignore:Please use `import python_multipart`:PendingDeprecationWarning:starlette

    # Supabase / gotrue: gotrue package renamed to supabase_auth
    ignore:The `gotrue` package is deprecated:DeprecationWarning

    # Pydantic v1 internals used by older openai/langchain SDKs
    ignore:ForwardRef._evaluate is a private API:DeprecationWarning:pydantic
    ignore:Core Pydantic V1 functionality isn't compatible:UserWarning:openai
    ignore:Core Pydantic V1 functionality isn't compatible:UserWarning:langchain_core

    # pytest internal: ZipFile deallocator on Python 3.14
    ignore::pytest.PytestUnraisableExceptionWarning
